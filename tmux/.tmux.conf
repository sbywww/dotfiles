# ---- 터미널 호환성 ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---- Prefix 키 변경 ----
# Ctrl+b → Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---- 기본 설정 ----
set -g mouse on                       # 마우스 사용 (스크롤, 패인 선택, 리사이즈)
set -g base-index 1                   # 윈도우 번호 1부터 시작
set -g renumber-windows on            # 윈도우 닫으면 번호 재정렬
set -g escape-time 10                 # ESC 지연 최소화 (10ms)
set -g history-limit 10000            # 스크롤백 버퍼 크기
set -g allow-passthrough on           # 이미지 프로토콜 패스스루 (popup 포함)
setw -g pane-base-index 1             # 패인 번호 1부터 시작

# ---- 키 바인딩 : 패인 ----
# 분할 (| 세로, - 가로, 현재 경로 유지)
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 이동 (Vim 스타일)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# 리사이즈 (Vim 스타일, Shift+hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 페인 전체 크기
# bind -r m resize-pane -Z

# 페인 즉시 종료
bind x kill-pane


# ---- 키 바인딩 : 윈도우 ----
# 새 윈도우 (현재 경로 유지)
bind c new-window -c "#{pane_current_path}"

# 윈도우 순서 변경
bind -n C-S-Left swap-window -t -1 \; previous-window
bind -n C-S-Right swap-window -t +1 \; next-window

# --- 키 바인딩 : 팝업/유틸리티 ----
bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh" # quick floating terminal
bind g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit # lazygit float

# 유틸리티
bind r source-file ~/.tmux.conf \; display "Reloaded!"
# yazi 파일 탐색기 (prefix + Tab: 50% 분할)
# bind Tab split-window -h -l 50% -c "#{pane_current_path}" "yazi"

# ---- Vi 모드 복사 ----
unbind v
bind v copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi MouseDragEnd1Pane

# ---- 플러그인 (tpm) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @plugin 'omerxx/tmux-sessionx' # default keybind "<prefix> O" to activate

# resurrect / continuum 설정 (자동 저장/복원)
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ---- 테마 (Catppuccin) ----
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'none'
set -g @catppuccin_pane_status_enabled 'off'
set -g @catppuccin_pane_border_status 'off'

# ---- 상태바 ----
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify 'absolute-centre'

# status left: 세션명 + 현재 경로 + zoom 표시
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
# set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
# set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "

set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"
# set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

# status right : 호스트명
set -g status-right-length 250
set -g status-right ""
# set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_green}]}} #{battery_icon} #{battery_percentage} "
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
set -g status-right "#[bg=#{@thm_bg},fg=#{@thm_rosewater}] 󰒋 #H "
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
# set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# ---- 패인 테두리 설정 ----
# setw -g pane-border-status top
# setw -g pane-border-format " #{pane_index} #{pane_current_command}"
# setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
# setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
# setw -g pane-border-lines double

# ---- 윈도우 탭 스타일 ----
# tmux 자동 이름 갱신 (실행 중인 프로그램명 표시, shell escape 덮어쓰기 차단)
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
setw -g allow-rename off

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_overlay_1}"

set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"

#  ---- tpm 초기화 (항상 마지막) ----
run '~/.tmux/plugins/tpm/tpm'